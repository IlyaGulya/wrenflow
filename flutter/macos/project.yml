name: Runner
options:
  bundleIdPrefix: me.gulya
  deploymentTarget:
    macOS: "10.15"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: false
    CLANG_ENABLE_MODULES: true
    CLANG_ENABLE_OBJC_ARC: true
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: true
    CLANG_WARN_BOOL_CONVERSION: true
    CLANG_WARN_COMMA: true
    CLANG_WARN_CONSTANT_CONVERSION: true
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: true
    CLANG_WARN_EMPTY_BODY: true
    CLANG_WARN_ENUM_CONVERSION: true
    CLANG_WARN_INFINITE_RECURSION: true
    CLANG_WARN_INT_CONVERSION: true
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: true
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: true
    CLANG_WARN_OBJC_LITERAL_CONVERSION: true
    CLANG_WARN_RANGE_LOOP_ANALYSIS: true
    CLANG_WARN_STRICT_PROTOTYPES: true
    CLANG_WARN_SUSPICIOUS_MOVE: true
    CLANG_WARN_UNGUARDED_AVAILABILITY: true
    CLANG_WARN_UNREACHABLE_CODE: true
    ENABLE_STRICT_OBJC_MSGSEND: true
    GCC_WARN_64_TO_32_BIT_CONVERSION: true
    GCC_WARN_ABOUT_RETURN_TYPE: true
    GCC_WARN_UNDECLARED_SELECTOR: true
    GCC_WARN_UNINITIALIZED_AUTOS: true
    GCC_WARN_UNUSED_FUNCTION: true
    GCC_WARN_UNUSED_VARIABLE: true

configs:
  Debug: debug
  Release: release
  Profile: release

targets:
  Runner:
    type: application
    platform: macOS
    sources:
      - path: Runner
        excludes:
          - "Configs/"
      - path: Flutter
        includes:
          - "*.swift"
    settings:
      base:
        INFOPLIST_FILE: Runner/Info.plist
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: me.gulya.wrenflow
        PRODUCT_NAME: wrenflow
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: T4LV8K9BGV
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Runner/DebugProfile.entitlements
        Profile:
          CODE_SIGN_ENTITLEMENTS: Runner/DebugProfile.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Runner/Release.entitlements
    configFiles:
      Debug: Runner/Configs/Debug.xcconfig
      Release: Runner/Configs/Release.xcconfig
      Profile: Runner/Configs/Debug.xcconfig
    preBuildScripts:
      - name: Download ONNX Runtime
        script: |
          "$PROJECT_DIR/../../scripts/download-ort.sh"
        basedOnDependencyAnalysis: false
      - name: Flutter Assemble
        script: |
          "$FLUTTER_ROOT"/packages/flutter_tools/bin/macos_assemble.sh && touch Flutter/ephemeral/tripwire
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Embed Flutter Frameworks
        script: |
          echo "$PRODUCT_NAME.app" > "$PROJECT_DIR"/Flutter/ephemeral/.app_filename && "$FLUTTER_ROOT"/packages/flutter_tools/bin/macos_assemble.sh embed
        basedOnDependencyAnalysis: false
      - name: Bundle ONNX Runtime
        script: |
          ORT_DYLIB="$PROJECT_DIR/../../vendor/onnxruntime/lib/libonnxruntime.dylib"
          DEST="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/MacOS/"
          if [ -f "$ORT_DYLIB" ]; then
            cp -f "$ORT_DYLIB" "$DEST"
            echo "Bundled libonnxruntime.dylib into $DEST"
          else
            echo "warning: libonnxruntime.dylib not found at $ORT_DYLIB — run scripts/download-ort.sh"
          fi
        basedOnDependencyAnalysis: false
  RunnerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RunnerTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/wrenflow.app/Contents/MacOS/wrenflow"
        PRODUCT_BUNDLE_IDENTIFIER: me.gulya.wrenflow.RunnerTests
    configFiles:
      Debug: Runner/Configs/Debug.xcconfig
      Release: Runner/Configs/Release.xcconfig
      Profile: Runner/Configs/Debug.xcconfig
    dependencies:
      - target: Runner
