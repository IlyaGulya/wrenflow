name: Build macOS App

on:
  push:
    branches: [main]
  # SECURITY: Do NOT change this to pull_request_target — that trigger runs with
  # access to repository secrets, which would expose signing credentials to fork PRs.
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Verify Swift version
        run: swift --version

      # Resolve dependencies and verify compilation first (fast feedback, no DMG tooling needed)
      - name: Resolve Swift package dependencies
        run: swift package resolve

      - name: Build (swift build)
        run: swift build -c debug

      # Full .app bundle + DMG (universal)
      - name: Install build tools
        run: brew install create-dmg fileicon

      - name: Use ad-hoc signing
        run: echo "CODESIGN_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Build app bundle (universal)
        run: make ARCH=universal APP_NAME=Wrenflow BUNDLE_ID=me.gulya.wrenflow CODESIGN_IDENTITY="$CODESIGN_IDENTITY"

      - name: Create DMG
        run: make dmg ARCH=universal APP_NAME=Wrenflow BUNDLE_ID=me.gulya.wrenflow CODESIGN_IDENTITY="$CODESIGN_IDENTITY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wrenflow
          path: build/Wrenflow.dmg
