name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      HAS_SIGNING_CERT: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 != '' }}
      HAS_NOTARIZE: ${{ secrets.APPLE_ID != '' }}
      IS_RELEASE: ${{ github.event_name == 'release' }}
      IS_BETA: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      IS_PR: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check if release-please commit
        id: skip
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [ "${{ env.IS_BETA }}" = "true" ] && echo "$MSG" | grep -qE '^chore\(main\): release'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode 26.3
        if: steps.skip.outputs.skip != 'true'
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install mise
        if: steps.skip.outputs.skip != 'true'
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install build tools
        if: steps.skip.outputs.skip != 'true'
        run: brew install create-dmg xclogparser

      - name: Cache Rust
        if: steps.skip.outputs.skip != 'true'
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: ". -> target"
          cache-on-failure: "true"
          prefix-key: "v3-rust"

      - name: Compute version info
        if: steps.skip.outputs.skip != 'true'
        id: version
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

          if [ "${{ env.IS_RELEASE }}" = "true" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            LATEST_TAG="${LATEST_TAG:-v0.0.0}"
            COMMITS_SINCE=$(git rev-list "${LATEST_TAG}..HEAD" --count)
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            NEXT_MINOR=$((MINOR + 1))
            TAG="v${MAJOR}.${NEXT_MINOR}.0-beta.${COMMITS_SINCE}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: steps.skip.outputs.skip != 'true' && env.HAS_SIGNING_CERT == 'true' && env.IS_PR != 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain >/dev/null 2>&1
          security list-keychains -d user -s build.keychain login.keychain
          rm certificate.p12
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "WRENFLOW_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      # PR: debug build only
      - name: Build (PR check)
        if: steps.skip.outputs.skip != 'true' && env.IS_PR == 'true'
        run: mise run build

      # Push to main / release: release build + DMG
      - name: Build release
        if: steps.skip.outputs.skip != 'true' && env.IS_PR != 'true'
        run: mise run release

      - name: Xcode build timing report
        if: steps.skip.outputs.skip != 'true' && always()
        run: |
          LOG=$(find ~/Library/Developer/Xcode/DerivedData -name "*.xcactivitylog" -newer build/macos 2>/dev/null | head -1)
          if [ -n "$LOG" ]; then
            echo "::group::Slowest targets"
            xclogparser parse --file "$LOG" --reporter summaryJson 2>/dev/null | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          targets = sorted(data.get('targets', []), key=lambda t: t.get('duration', 0), reverse=True)
          for t in targets[:10]:
            print(f\"  {t['duration']:.1f}s  {t['name']}\")
          " || echo "  (could not parse log)"
            echo "::endgroup::"
            echo "::group::Slowest files (>2s)"
            xclogparser parse --file "$LOG" --reporter flatJson 2>/dev/null | python3 -c "
          import json, sys
          steps = json.load(sys.stdin)
          slow = sorted([s for s in steps if s.get('duration', 0) > 2], key=lambda s: s['duration'], reverse=True)
          for s in slow[:20]:
            print(f\"  {s['duration']:.1f}s  {s.get('title', s.get('documentURL', 'unknown'))}\")
          " || echo "  (could not parse log)"
            echo "::endgroup::"
          else
            echo "No xcactivitylog found"
          fi

      - name: Create DMG
        if: steps.skip.outputs.skip != 'true' && env.IS_PR != 'true'
        run: |
          APP="build/macos/Build/Products/Release/wrenflow.app"
          DMG="build/Wrenflow.dmg"
          mkdir -p build
          rm -f "$DMG"
          create-dmg \
            --volname "Wrenflow" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "wrenflow.app" 180 170 \
            --hide-extension "wrenflow.app" \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "$DMG" "$APP" || true

          if [ -n "$WRENFLOW_CODESIGN_IDENTITY" ] && [ "$WRENFLOW_CODESIGN_IDENTITY" != "-" ]; then
            codesign --force --sign "$WRENFLOW_CODESIGN_IDENTITY" --timestamp "$DMG"
          fi

      - name: Notarize DMG
        if: steps.skip.outputs.skip != 'true' && env.IS_PR != 'true' && env.HAS_NOTARIZE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          SUBMIT_OUT=$(xcrun notarytool submit build/Wrenflow.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 600 2>&1) || true
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep "  id:" | head -1 | awk '{print $2}')
          if echo "$SUBMIT_OUT" | grep -q "status: Invalid"; then
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD"
            exit 1
          fi
          xcrun stapler staple build/Wrenflow.dmg

      - name: Verify codesign
        if: steps.skip.outputs.skip != 'true' && env.IS_PR != 'true'
        run: codesign --verify --deep --strict "build/macos/Build/Products/Release/wrenflow.app" || true

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      # Release: upload DMG to existing GitHub Release
      - name: Upload DMG to release
        if: env.IS_RELEASE == 'true'
        run: mv build/Wrenflow.dmg Wrenflow.dmg
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        if: env.IS_RELEASE == 'true'
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: Wrenflow.dmg

      # Beta: create pre-release with DMG
      - name: Create beta pre-release
        if: steps.skip.outputs.skip != 'true' && env.IS_BETA == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv build/Wrenflow.dmg Wrenflow.dmg
          gh release create "$TAG" Wrenflow.dmg \
            --title "Wrenflow $TAG" \
            --prerelease \
            --notes "Beta build from \`main\`. [Latest stable release](https://github.com/${{ github.repository }}/releases/latest)."
