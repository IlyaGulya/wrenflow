name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty to auto-generate.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      HAS_SIGNING_CERT: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 != '' }}
      HAS_NOTARIZE: ${{ secrets.APPLE_ID != '' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@7b1c307e0dcbda6122208f10795a713336a9b35a # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: core -> target

      - name: Build Rust FFI (release, universal)
        run: |
          cd core
          cargo build -p wrenflow-ffi --release --target aarch64-apple-darwin
          cargo build -p wrenflow-ffi --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/libwrenflow_ffi.a \
            target/x86_64-apple-darwin/release/libwrenflow_ffi.a \
            -output target/release/libwrenflow_ffi.a

      - name: Determine release tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="build-$(date -u +'%Y%m%d-%H%M%S')-${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Embed build tag in Info.plist
        run: plutil -insert WrenflowBuildTag -string "${{ steps.version.outputs.tag }}" Info.plist

      - name: Install build tools
        run: brew install create-dmg fileicon just

      - name: Import signing certificate
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          rm certificate.p12
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "WRENFLOW_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Fall back to ad-hoc signing
        if: env.HAS_SIGNING_CERT != 'true'
        run: echo "WRENFLOW_CODESIGN_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Build release app + DMG
        run: just dmg

      - name: Notarize DMG
        if: env.HAS_NOTARIZE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit build/Wrenflow.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 600
          xcrun stapler staple build/Wrenflow.dmg

      - name: Verify codesign
        run: codesign --verify --deep --strict "build/Wrenflow.app" || true

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      - name: Rename DMG for release
        run: mv build/Wrenflow.dmg Wrenflow.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Wrenflow ${{ steps.version.outputs.tag }}
          body: |
            ## Download

            **[Wrenflow.dmg](https://github.com/IlyaGulya/wrenflow/releases/latest/download/Wrenflow.dmg)** — Universal build (Apple Silicon + Intel).
          generate_release_notes: true
          make_latest: true
          files: |
            Wrenflow.dmg
