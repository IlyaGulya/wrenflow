name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0). Leave empty to auto-generate a build tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Verify Swift version
        run: swift --version

      - name: Determine release tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="build-$(date -u +'%Y%m%d-%H%M%S')-${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Embed build tag in Info.plist
        run: plutil -insert WrenflowBuildTag -string "${{ steps.version.outputs.tag }}" Info.plist

      - name: Install build tools
        run: brew install create-dmg fileicon

      # Ad-hoc signing — no Developer ID certificate required
      - name: Use ad-hoc signing
        run: echo "CODESIGN_IDENTITY=-" >> "$GITHUB_ENV"

      - name: Build universal app bundle
        run: make ARCH=universal APP_NAME=Wrenflow BUNDLE_ID=me.gulya.wrenflow CODESIGN_IDENTITY="$CODESIGN_IDENTITY"

      - name: Create universal DMG
        run: make dmg ARCH=universal APP_NAME=Wrenflow BUNDLE_ID=me.gulya.wrenflow CODESIGN_IDENTITY="$CODESIGN_IDENTITY"

      - name: Rename DMG for release
        run: mv build/Wrenflow.dmg Wrenflow.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Wrenflow ${{ steps.version.outputs.tag }}
          body: |
            ## Download

            **[Wrenflow.dmg](https://github.com/IlyaGulya/wrenflow/releases/latest/download/Wrenflow.dmg)** — Universal build for all Macs (Apple Silicon + Intel).

            > **Note:** This build is ad-hoc signed. On first launch, right-click the app and choose **Open** to bypass Gatekeeper.
          generate_release_notes: true
          make_latest: true
          files: |
            Wrenflow.dmg
