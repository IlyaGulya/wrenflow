[tools]
rust = "1.94.1"
flutter = "3.41.6"
ruby = { version = "3.4.9", options = { compile = false } }
"cargo:rinf_cli" = "8.10.0"
"gem:cocoapods" = "1.16.2"
xcodegen = "2.45.3"

# ── Tasks ──────────────────────────────────────────────────────

[tasks.setup]
description = "Install all tools and dependencies"
run = """
mise install
cd flutter && flutter pub get
cd flutter && rinf gen
"""

[tasks.xcodegen]
description = "Generate Xcode project from project.yml"
dir = "flutter/macos"
run = "xcodegen generate --spec project.yml"

[tasks.gen]
description = "Generate Dart bindings from Rust signals"
dir = "flutter"
run = "rinf gen"

[tasks.gen-watch]
description = "Watch and regenerate Dart bindings on changes"
dir = "flutter"
run = "rinf gen --watch"

[tasks.build]
description = "Build macOS debug app"
depends = ["gen", "xcodegen"]
dir = "flutter"
run = "flutter build macos --debug"

[tasks.release]
description = "Build macOS release app"
depends = ["gen", "xcodegen"]
dir = "flutter"
run = "flutter build macos --release"

[tasks.run]
description = "Run macOS debug app"
depends = ["gen", "xcodegen"]
dir = "flutter"
run = "flutter run -d macos"

[tasks.analyze]
description = "Run Flutter analyzer"
dir = "flutter"
run = "flutter analyze"

[tasks.test]
description = "Run Flutter tests"
dir = "flutter"
run = "flutter test"

[tasks.test-rust]
description = "Run Rust domain + core tests"
dir = "core"
run = "cargo test -p wrenflow-domain -p wrenflow-core"

[tasks.check-rust]
description = "Check Rust hub compiles"
dir = "flutter/native/hub"
run = "cargo check"

[tasks.clean]
description = "Clean all build artifacts"
run = """
cd flutter && flutter clean
cd flutter/native/hub && cargo clean
"""
